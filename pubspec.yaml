name: lingua_learn
description: "LinguaLearn - An interactive language learning app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  get_it: ^8.0.2
  injectable: ^2.5.0
  google_generative_ai: ^0.4.6
  http: ^1.2.2
